[package]
name = "gongwen"
version = "0.1.0"
entrypoint = "src/lib.typ"
authors = ["Gakusyun <i@gkux.cn>"]
license = "MIT"
description = "Gongwen (公文) is a Typst package for creating Chinese official documents with proper formatting according to GB/T 9704—2012 national standard."
repository = "https://github.com/gakusyun/gongwen"
keywords = ["chinese", "document", "template"]
categories = ["report"]
disciplines = ["education", "computer-science"]
compiler = "0.14.2"

[template]
path = "template"
entrypoint = "main.typ"
thumbnail = "thumbnail.png"